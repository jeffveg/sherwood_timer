<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sherwood Adventure Timer</title>
    <link rel="apple-touch-icon" href="/static/../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/../favicon-16x16.png">
    <link rel="manifest" href="/static/../site.webmanifest">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="app">

        <!-- HEADER: Timer + Score Totals (visible during game) -->
        <header id="game-header" class="hidden">
            <div id="header-green">
                <span class="header-team-name" id="header-green-name">Green</span>
                <span class="header-team-score" id="header-green-total">0</span>
            </div>
            <div id="timer-display">0:00</div>
            <div id="header-yellow">
                <span class="header-team-name" id="header-yellow-name">Yellow</span>
                <span class="header-team-score" id="header-yellow-total">0</span>
            </div>
        </header>

        <!-- SCORING VIEW (shown when game is playing) -->
        <main id="scoring-view" class="hidden">

            <!-- Score Up Buttons -->
            <div class="score-section">
                <div class="section-label">Score Up</div>
                <div class="score-grid">
                    <button class="score-btn green-btn" data-action="GHU">
                        <span class="btn-label">Hit</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="green-hit-val">0</span>
                    </button>
                    <button class="score-btn yellow-btn" data-action="YHU">
                        <span class="btn-label">Hit</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="yellow-hit-val">0</span>
                    </button>

                    <button class="score-btn green-btn spot-btn" data-action="GSU">
                        <span class="btn-label">Spot</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="green-spot-val">0</span>
                    </button>
                    <button class="score-btn yellow-btn spot-btn" data-action="YSU">
                        <span class="btn-label">Spot</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="yellow-spot-val">0</span>
                    </button>

                    <button class="score-btn green-btn catch-btn" data-action="GCU">
                        <span class="btn-label">Catch</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="green-catch-val">0</span>
                    </button>
                    <button class="score-btn yellow-btn catch-btn" data-action="YCU">
                        <span class="btn-label">Catch</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="yellow-catch-val">0</span>
                    </button>

                    <button class="score-btn green-btn penalty-btn" data-action="GPU">
                        <span class="btn-label">Penalty</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="green-penalty-val">0</span>
                    </button>
                    <button class="score-btn yellow-btn penalty-btn" data-action="YPU">
                        <span class="btn-label">Penalty</span>
                        <span class="btn-icon">+</span>
                        <span class="btn-value" id="yellow-penalty-val">0</span>
                    </button>
                </div>
            </div>

            <!-- Score Down Buttons (corrections) -->
            <div class="score-section corrections">
                <div class="section-label">Corrections</div>
                <div class="score-grid">
                    <button class="score-btn green-btn down-btn" data-action="GHD">
                        <span class="btn-label">Hit</span>
                        <span class="btn-icon">&minus;</span>
                    </button>
                    <button class="score-btn yellow-btn down-btn" data-action="YHD">
                        <span class="btn-label">Hit</span>
                        <span class="btn-icon">&minus;</span>
                    </button>

                    <button class="score-btn green-btn down-btn spot-btn" data-action="GSD">
                        <span class="btn-label">Spot</span>
                        <span class="btn-icon">&minus;</span>
                    </button>
                    <button class="score-btn yellow-btn down-btn spot-btn" data-action="YSD">
                        <span class="btn-label">Spot</span>
                        <span class="btn-icon">&minus;</span>
                    </button>

                    <button class="score-btn green-btn down-btn catch-btn" data-action="GCD">
                        <span class="btn-label">Catch</span>
                        <span class="btn-icon">&minus;</span>
                    </button>
                    <button class="score-btn yellow-btn down-btn catch-btn" data-action="YCD">
                        <span class="btn-label">Catch</span>
                        <span class="btn-icon">&minus;</span>
                    </button>

                    <button class="score-btn green-btn down-btn penalty-btn" data-action="GPD">
                        <span class="btn-label">Penalty</span>
                        <span class="btn-icon">&minus;</span>
                    </button>
                    <button class="score-btn yellow-btn down-btn penalty-btn" data-action="YPD">
                        <span class="btn-label">Penalty</span>
                        <span class="btn-icon">&minus;</span>
                    </button>
                </div>
            </div>

            <!-- Game Controls: Pause / Stop / Early Win -->
            <div class="score-section game-controls">
                <div class="game-controls-grid">
                    <button class="game-ctrl-btn pause-btn" id="pause-btn" data-confirm="PAUSE">
                        <span class="game-ctrl-icon" id="pause-icon">&#9208;</span>
                        <span class="game-ctrl-label" id="pause-label">Pause</span>
                    </button>
                    <button class="game-ctrl-btn stop-btn" data-confirm="STOP">
                        <span class="game-ctrl-icon">&#9209;</span>
                        <span class="game-ctrl-label">Stop Game</span>
                    </button>
                    <button class="game-ctrl-btn earlywin-btn elim-only-btn" data-confirm="EARLYWIN">
                        <span class="game-ctrl-icon">&#9733;</span>
                        <span class="game-ctrl-label">Early Win</span>
                    </button>
                </div>
            </div>

        </main>

        <!-- VIDEO CONTROLS VIEW (shown when a video is playing) -->
        <main id="video-controls" class="hidden">
            <div class="waiting-content">
                <div class="waiting-icon">&#127910;</div>
                <div class="waiting-text">Video Playing</div>
            </div>
            <div class="score-section game-controls">
                <div class="game-controls-grid">
                    <button class="game-ctrl-btn pause-btn" data-video-action="pause">
                        <span class="game-ctrl-icon">&#9208;</span>
                        <span class="game-ctrl-label">Pause</span>
                    </button>
                    <button class="game-ctrl-btn stop-btn" data-video-action="stop">
                        <span class="game-ctrl-icon">&#9209;</span>
                        <span class="game-ctrl-label">Stop Video</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- WAITING VIEW (shown during countdown / transitions) -->
        <main id="waiting-view" class="hidden">
            <div class="waiting-content">
                <div class="waiting-icon">&#9201;</div>
                <div class="waiting-text" id="waiting-message">Getting Ready...</div>
            </div>
        </main>

        <!-- MANAGEMENT VIEW (shown when no game is running) -->
        <main id="management-view">
            <div id="next-game-info">
                <h2>Next Game</h2>
                <div class="team-preview">
                    <div class="team-preview-card green-card">
                        <span class="team-label">Green</span>
                        <span class="team-name" id="next-green-name">---</span>
                    </div>
                    <div class="team-preview-card yellow-card">
                        <span class="team-label">Yellow</span>
                        <span class="team-name" id="next-yellow-name">---</span>
                    </div>
                </div>
            </div>

            <button class="start-game-btn" data-confirm="START">
                <span class="start-game-icon">&#9654;</span>
                <span class="start-game-label">Start Game</span>
            </button>

            <div id="control-grid">
                <button class="ctrl-btn" data-action="GT">
                    <span class="ctrl-label">Game Type</span>
                    <span class="ctrl-value" id="game-type-val">Elimination</span>
                </button>
                <button class="ctrl-btn" data-action="AI">
                    <span class="ctrl-label">Auto Instructions</span>
                    <span class="ctrl-value" id="auto-inst-val">OFF</span>
                </button>
                <button class="ctrl-btn" data-action="TT">
                    <span class="ctrl-label">Tourn Integration</span>
                    <span class="ctrl-value" id="api-int-val">OFF</span>
                </button>
                <button class="ctrl-btn" data-action="RD">
                    <span class="ctrl-label">Refresh Data</span>
                    <span class="ctrl-value">Sherwood</span>
                </button>
                <button class="ctrl-btn" data-action="TM">
                    <span class="ctrl-label">Music</span>
                    <span class="ctrl-value" id="music-val">ON</span>
                </button>
                <button class="ctrl-btn" data-action="MV">
                    <span class="ctrl-label">Volume</span>
                    <span class="ctrl-value" id="vol-val">25</span>
                </button>
            </div>

            <div class="footer-links">
                <a href="/games" class="admin-link">&#9776; Game Schedule</a>
                <a href="/main_display" class="admin-link">&#9728; Main Display</a>
                <a href="/scorer" class="admin-link">&#9998; Scorer</a>
                <a href="/admin" class="admin-link">&#9881; Admin Settings</a>
            </div>
        </main>

        <!-- Confirmation Modal -->
        <div id="confirm-overlay" class="hidden">
            <div id="confirm-modal">
                <div id="confirm-message">Are you sure?</div>
                <div id="confirm-buttons">
                    <button id="confirm-yes" class="confirm-btn confirm-yes">Yes</button>
                    <button id="confirm-no" class="confirm-btn confirm-no">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Tournament Selection Modal -->
        <div id="tournament-overlay" class="hidden">
            <div id="tournament-modal">
                <div id="tournament-title">Select Tournament</div>
                <select id="tournament-select">
                    <option value="">-- Choose --</option>
                </select>
                <div id="tournament-game-type-row">
                    <label id="tournament-gt-label" for="tournament-game-type">Game Type Override</label>
                    <select id="tournament-game-type">
                        <option value="">Use API Default</option>
                        <option value="Elimination">Elimination</option>
                        <option value="Tournament">Tournament</option>
                        <option value="Sanction">Sanction</option>
                        <option value="Normal">Normal</option>
                    </select>
                </div>
                <div id="tournament-none" class="hidden">No active tournaments found.</div>
                <div id="tournament-buttons">
                    <button id="tournament-ok" class="confirm-btn confirm-yes confirm-start">Select</button>
                    <button id="tournament-cancel" class="confirm-btn confirm-no">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Connection status -->
        <div id="connection-status">Connected</div>

    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
